<div class="container py-5">
    <h2 class="text-center mb-4">Login to SkillMatch AI</h2>

    <form #loginForm="ngForm" (ngSubmit)="onLogin()">
        <p class="text-center mt-3">
            Don't have an account?
            <a routerLink="/auth/register">Create one</a>
        </p>

        <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" name="email" [(ngModel)]="email" required />
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" [(ngModel)]="password" required />
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="!loginForm.valid">
            Login
        </button>
    </form>
</div>
